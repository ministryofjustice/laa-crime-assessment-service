name: Build and Deploy to Non-Prod Environments

permissions:
  id-token: write
  contents: read

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

jobs:

  application-image-build:
    name: application-image-build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 #v5
        with:
          distribution: 'corretto'
          java-version: '21'
      - uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 #v6
        with:
          role-to-assume: ${{ secrets.ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.ECR_REGION }}
      - uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7 #v2
        id: login-ecr
      - name: Build & Push Image
        id: build-and-push-image
        run: |
          echo "Building the ear file and Docker image with gradle..."
          pushd crime-assessment-service
          chmod +x ./gradlew
          ./gradlew build
          echo "Building the docker image and tagging it"
          docker build -t crime-assessment-service .
          docker tag crime-assessment-service $REGISTRY/$REPOSITORY:$GITHUB_TAG
          echo "Pushing the Docker image to $REGISTRY/$REPOSITORY:$GITHUB_TAG"
          docker push $REGISTRY/$REPOSITORY:$GITHUB_TAG
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          GITHUB_TAG: ${{ github.sha }}


  deploy-to-development:
    name: deploy-to-development
    needs: [application-image-build]
    runs-on: ubuntu-24.04
    environment: development
    env:
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
      - name: Authenticating to the Kubernetes cluster
        id: authenticate-k8s-cluster
        run: |
          echo "${{ secrets.KUBE_CERT }}" > ca.crt
          kubectl config set-cluster ${KUBE_CLUSTER} --certificate-authority=./ca.crt --server=https://${KUBE_CLUSTER}
          kubectl config set-credentials deploy-user --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context ${KUBE_CLUSTER} --cluster=${KUBE_CLUSTER} --user=deploy-user --namespace=${KUBE_NAMESPACE}
          kubectl config use-context ${KUBE_CLUSTER}

      - name: Helm deploy to Dev environment
        id: deploy-to-dev
        run: |
          cd helm_deploy/crime-assessment-service
          helm upgrade crime-assessment-service -f values-dev.yaml . --install --wait --namespace=${KUBE_NAMESPACE} --set image.tag="$GITHUB_TAG"
        env:
          GITHUB_TAG: ${{ github.sha }}

#      - name: Notify Slack channel
#        uses: ./.github/actions/slack-notify-composite-action
#        with:
#          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-to-test:
    name: deploy-to-test
    needs: [application-image-build]
    runs-on: ubuntu-24.04
    environment: test
    env:
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
      - name: Authenticating to the Kubernetes cluster
        id: authenticate-k8s-cluster
        run: |
          echo "${{ secrets.KUBE_CERT }}" > ca.crt
          kubectl config set-cluster ${KUBE_CLUSTER} --certificate-authority=./ca.crt --server=https://${KUBE_CLUSTER}
          kubectl config set-credentials deploy-user --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context ${KUBE_CLUSTER} --cluster=${KUBE_CLUSTER} --user=deploy-user --namespace=${KUBE_NAMESPACE}
          kubectl config use-context ${KUBE_CLUSTER}

      - name: Helm deploy to Test environment
        id: deploy-to-test
        run: |
          cd helm_deploy/crime-assessment-service
          helm upgrade crime-assessment-service -f values-test.yaml . --install --wait --namespace=${KUBE_NAMESPACE} --set image.tag="$GITHUB_TAG"
        env:
          GITHUB_TAG: ${{ github.sha }}

#      - name: Notify Slack channel
#        uses: ./.github/actions/slack-notify-composite-action
#        with:
#          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  deploy-to-uat:
    name: deploy-to-uat
    needs: [application-image-build]
    runs-on: ubuntu-24.04
    environment: uat
    env:
      KUBE_NAMESPACE: ${{ secrets.KUBE_NAMESPACE }}
      KUBE_CLUSTER: ${{ secrets.KUBE_CLUSTER }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6
      - name: Authenticating to the Kubernetes cluster
        id: authenticate-k8s-cluster
        run: |
          echo "${{ secrets.KUBE_CERT }}" > ca.crt
          kubectl config set-cluster ${KUBE_CLUSTER} --certificate-authority=./ca.crt --server=https://${KUBE_CLUSTER}
          kubectl config set-credentials deploy-user --token=${{ secrets.KUBE_TOKEN }}
          kubectl config set-context ${KUBE_CLUSTER} --cluster=${KUBE_CLUSTER} --user=deploy-user --namespace=${KUBE_NAMESPACE}
          kubectl config use-context ${KUBE_CLUSTER}

      - name: Helm deploy to UAT environment
        id: deploy-to-uat
        run: |
          cd helm_deploy/crime-assessment-service
          helm upgrade crime-assessment-service -f values-uat.yaml . --install --wait --namespace=${KUBE_NAMESPACE} --set image.tag="$GITHUB_TAG"
        env:
          GITHUB_TAG: ${{ github.sha }}

#      - name: Notify Slack channel
#        uses: ./.github/actions/slack-notify-composite-action
#        with:
#          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}